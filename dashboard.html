<!DOCTYPE html>
<html>
<head>
    <title>REU Panel - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h2>📊 Dashboard</h2>
        <div>
            <a href="dashboard.html">Home</a> |
            <a href="profile.html">Profile</a> |
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="container">
        <h1>Selamat datang, <span id="user-email">...</span></h1>
        <p>Ini adalah dashboard. Data victim akan muncul di sini (nanti di-loop dari Firebase).</p>
        <div id="victim-list"></div>
    </div>

    <script type="module">
        import { auth, database, signOut, ref, onValue } from './firebase-config.js'; // Ganti onValue kalo perlu
        import { get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const user = auth.currentUser;
        if (!user) {
            window.location.href = 'index.html'; // Kalo ga login, balik
        } else {
            document.getElementById('user-email').innerText = user.email;
            // Di sini lo bisa fetch data victim berdasarkan UID user
            // Contoh: fetch data dari /victims/{user.uid}
        }

        window.logout = function() {
            signOut(auth).then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
