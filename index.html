<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REU Panel • Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🔐 REU Panel <span>v3.0</span></h1>
            <p class="subtitle">Masuk dengan akun Firebase-mu</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Login ke Panel</button>
            </form>
            
            <div id="errorMessage" class="error hidden"></div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Cek apakah user terdaftar di database
                const userRef = db.ref('settings/users_db/' + user.uid);
                const snapshot = await userRef.once('value');
                
                if (snapshot.exists() || user.uid === 'OWNER_UID_MU') {
                    // Redirect ke dashboard dengan data user
                    window.location.href = `dashboard.html?uid=${user.uid}`;
                } else {
                    errorDiv.textContent = 'Akun tidak terdaftar. Hubungi owner.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Email atau password salah!';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
