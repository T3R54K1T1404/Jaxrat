<!DOCTYPE html>
<html>
<head>
    <title>REU Panel - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>🔐 REU Monitoring Panel</h2>
        <p>Login dengan Akun Firebase (Email/Password)</p>
        <input type="email" id="email" placeholder="Email Firebase" />
        <input type="password" id="password" placeholder="Password Firebase" />
        <button onclick="login()">MASUK</button>
        <p id="error-message" style="color: red;"></p>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from './firebase-config.js';

        window.login = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Login sukses, redirect ke dashboard
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    errorMsg.innerText = 'Gagal: ' + error.message;
                });
        }
    </script>
</body>
</html>
