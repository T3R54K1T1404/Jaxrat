<!DOCTYPE html>
<html>
<head>
    <title>REU Panel - Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h2>👤 Profile</h2>
        <div>
            <a href="dashboard.html">Dashboard</a> |
            <a href="profile.html">Profile</a> |
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="container">
        <h1>Informasi Akun Firebase</h1>
        <p><strong>Email:</strong> <span id="profile-email"></span></p>
        <p><strong>Password:</strong> (Ga bisa ditampilkan, tapi lo inget sendiri pas buat akun)</p>
        <p><strong>UID Firebase:</strong> <span id="profile-uid"></span></p>
        <button onclick="copyUID()">📋 Copy UID</button>
        <p id="copy-msg"></p>
    </div>

    <script type="module">
        import { auth, signOut } from './firebase-config.js';

        const user = auth.currentUser;
        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('profile-email').innerText = user.email;
            document.getElementById('profile-uid').innerText = user.uid;
        }

        window.logout = function() {
            signOut(auth).then(() => {
                window.location.href = 'index.html';
            });
        }

        window.copyUID = function() {
            const uid = document.getElementById('profile-uid').innerText;
            navigator.clipboard.writeText(uid).then(() => {
                document.getElementById('copy-msg').innerText = 'UID Tercopy!';
            });
        }
    </script>
</body>
</html>
