<!DOCTYPE html>
<html>
<head>
    <title>👤 Profile</title>
    <!-- Include firebase sama kayak di dashboard -->
</head>
<body style="background:#0a0e2a; color:white; padding:20px;">
    <h2>👤 PROFILE USER</h2>
    <div style="background:#151e3d; padding:20px; border-radius:5px;">
        <p><strong>Email:</strong> <span id="profileEmail"></span></p>
        <p><strong>UID Firebase:</strong> <span id="profileUid" style="background:#1e2a3a; padding:5px;">Mengambil...</span> <button onclick="copyUid()">📋 Salin</button></p>
        <p><strong>Owner Mode:</strong> <span id="ownerStatus">Cek...</span></p>
    </div>
    <script>
        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                document.getElementById('profileEmail').innerText = user.email;
                document.getElementById('profileUid').innerText = user.uid;
                
                // Cek apakah user adalah owner (uid = owner_uid di settings)
                firebase.database().ref('settings/owner_uid').once('value', snap => {
                    if(snap.val() === user.uid) {
                        document.getElementById('ownerStatus').innerHTML = '✅ OWNER';
                    } else {
                        document.getElementById('ownerStatus').innerHTML = '❌ User Biasa';
                    }
                });
            }
        });
        function copyUid() {
            navigator.clipboard.writeText(document.getElementById('profileUid').innerText);
            alert('UID tersalin!');
        }
    </script>
</body>
</html>
